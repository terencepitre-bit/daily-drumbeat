name: Daily Drumbeat Issue

on:
  schedule:
    # 10:00 UTC = 6:00am ET during daylight time (roughly Mar-Nov),
    # and 5:00am ET during standard time (roughly Nov-Mar).
    # If you want it locked to 6am ET exactly year-round, you'd need two
    # cron lines and to disable one seasonally - most people just accept
    # the one-hour drift twice a year. See SETUP.md for the alternative.
    - cron: "17 10 * * 1-5"
  workflow_dispatch: {} # lets you click "Run workflow" manually to test

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate today's issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: "The Daily Drumbeat"
        run: node scripts/generate-issue.mjs

      - name: Commit and push
        run: |
          git config user.name "Drumbeat Bot"
          git config user.email "bot@thedailydrumbeat.com"
          git add index.html today.html archive.html issues/
          git commit -m "Daily issue: $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push
